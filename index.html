<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCLAW 工作室 - 访问受限</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#0f1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .gate{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:90%;box-shadow:0 24px 48px rgba(0,0,0,.4);position:relative;overflow:hidden}
  .gate::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#56d364,#a371f7,#58a6ff)}
  .gate-icon{font-size:56px;margin-bottom:12px}
  .gate h1{font-size:24px;font-weight:600;margin-bottom:8px;letter-spacing:-.5px}
  .gate-sub{font-size:14px;color:#8b949e;margin-bottom:32px}
  .gate input{width:100%;padding:14px 18px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#e6edf3;font-size:16px;outline:none;transition:border-color .2s;margin-bottom:12px}
  .gate input:focus{border-color:#58a6ff}
  .gate button{width:100%;padding:14px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:background .2s}
  .gate button:hover{background:#2ea043}
  .gate button:active{transform:scale(.98)}
  .gate-error{color:#f85149;font-size:13px;margin-bottom:10px;display:none;text-align:left;padding-left:4px}
  .hint{margin-top:24px;font-size:12px;color:#484f58;line-height:1.6}
  .logo-footer{margin-top:28px;font-size:12px;color:#484f58}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .4s ease}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<!-- 登录界面 -->
<div id="loginView" class="gate fade-up">

  <div id="loginError" class="gate-error">⚠ 密码错误，请重试</div>

  <p class="hint">本页面受密码保护，仅限授权人员访问<br>如忘记密码请联系管理员</p>
  <p class="logo-footer">Powered by QCLAW · AI Studio</p>
</div>
